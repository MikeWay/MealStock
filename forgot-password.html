<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password — Meal Stock Control</title>
<style>
  :root{
    --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0ede8;--border:#ddd9d0;
    --text:#1a1916;--text2:#6b6860;--text3:#9b9890;
    --accent:#2d6a4f;--accent-light:#e8f4ee;--accent-text:#1a4a35;
    --danger:#991b1b;--danger-light:#fee2e2;
    --success:#14532d;--success-light:#dcfce7;
    --radius:8px;--radius-lg:12px;
    --shadow-md:0 4px 12px rgba(0,0,0,.10);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#141412;--surface:#1e1d1a;--surface2:#272520;--border:#35332e;
    --text:#f0ede8;--text2:#9b9890;--text3:#6b6860;
    --accent:#4ade80;--accent-light:#052e16;--accent-text:#86efac;
    --danger:#f87171;--danger-light:#2d0a0a;
    --success:#86efac;--success-light:#052e16;
  }}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .logo{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:24px;letter-spacing:.01em}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:380px;box-shadow:var(--shadow-md)}
  h1{font-size:20px;font-weight:600;margin-bottom:6px}
  .subtitle{font-size:13px;color:var(--text2);margin-bottom:24px}
  .field{margin-bottom:14px}
  label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
  input[type=email]{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;outline:none;transition:border .15s}
  input:focus{border-color:var(--accent)}
  .submit-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;transition:opacity .15s}
  .submit-btn:hover{opacity:.9}
  .error{background:var(--danger-light);color:var(--danger);border:1px solid var(--danger);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:16px}
  .success{background:var(--success-light);color:var(--success);border:1px solid var(--success);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:16px}
  .back-link{display:block;text-align:center;margin-top:18px;font-size:13px;color:var(--accent);text-decoration:none}
  .back-link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="logo">Meal Stock Control</div>
<div class="card">
  <h1>Reset password</h1>
  <p class="subtitle">Enter your email and we'll send you a reset link.</p>

  <div id="msg-box" style="display:none"></div>

  <form method="post" action="/auth/forgot-password" id="reset-form">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
    </div>
    <button type="submit" class="submit-btn">Send reset link</button>
  </form>

  <a href="/login" class="back-link">Back to sign in</a>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  var box = document.getElementById('msg-box');
  if (p.get('sent') === '1') {
    box.className = 'success';
    box.textContent = 'If that email is registered, a reset link has been sent. Check your inbox.';
    box.style.display = 'block';
    document.getElementById('reset-form').style.display = 'none';
  } else if (p.get('error') === '1') {
    box.className = 'error';
    box.textContent = 'Something went wrong. Please try again.';
    box.style.display = 'block';
  }
})();
</script>
</body>
</html>
