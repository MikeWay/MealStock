events {}
http {
  server {
    listen 80;

    location /mealstock {
      proxy_pass         http://localhost:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ribmanager {
      return 503 "Ribmanager coming soon\n";
    }

    location = /scm-tools {
      return 301 /scm-tools/;
    }

    location /scm-tools/ {
      proxy_pass         http://localhost:3001/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_buffering    off;
      proxy_cache        off;
      proxy_read_timeout 3600s;
      # Prevent gzip so sub_filter can rewrite HTML
      proxy_set_header   Accept-Encoding "";
      # Rewrite absolute /api/ paths so they work under /scm-tools/ prefix
      sub_filter         '"/api/' '"/scm-tools/api/';
      sub_filter_once    off;
    }

    location = / {
      return 301 /mealstock/;
    }
  }
}
