<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — Meal Stock Control</title>
<style>
  :root{
    --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0ede8;--border:#ddd9d0;
    --text:#1a1916;--text2:#6b6860;--text3:#9b9890;
    --accent:#2d6a4f;--accent-light:#e8f4ee;--accent-text:#1a4a35;
    --danger:#991b1b;--danger-light:#fee2e2;
    --radius:8px;--radius-lg:12px;
    --shadow-md:0 4px 12px rgba(0,0,0,.10);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#141412;--surface:#1e1d1a;--surface2:#272520;--border:#35332e;
    --text:#f0ede8;--text2:#9b9890;--text3:#6b6860;
    --accent:#4ade80;--accent-light:#052e16;--accent-text:#86efac;
    --danger:#f87171;--danger-light:#2d0a0a;
  }}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .logo{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:24px;letter-spacing:.01em}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:380px;box-shadow:var(--shadow-md)}
  h1{font-size:20px;font-weight:600;margin-bottom:6px}
  .subtitle{font-size:13px;color:var(--text2);margin-bottom:24px}
  .mode-toggle{display:flex;background:var(--surface2);border-radius:var(--radius);padding:3px;margin-bottom:22px;gap:3px}
  .mode-btn{flex:1;padding:6px;border:none;background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
  .mode-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .field{margin-bottom:14px}
  label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
  input[type=email],input[type=password],input[type=text]{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;outline:none;transition:border .15s}
  input:focus{border-color:var(--accent)}
  .name-field{display:none}
  .name-field.visible{display:block}
  .submit-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;transition:opacity .15s}
  .submit-btn:hover{opacity:.9}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .oauth-btn{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;text-decoration:none;transition:background .15s}
  .oauth-btn:hover{background:var(--surface2)}
  .oauth-btn svg{width:18px;height:18px;flex-shrink:0}
  .error{background:var(--danger-light);color:var(--danger);border:1px solid var(--danger);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:16px}
  .success{background:var(--accent-light);color:var(--accent-text);border:1px solid var(--accent);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:16px}
  .hint{font-size:12px;color:var(--text3);margin-top:4px}
  .forgot-link{display:block;text-align:right;font-size:12px;color:var(--accent);text-decoration:none;margin-top:4px}
  .forgot-link:hover{text-decoration:underline}
  .oauth-section{display:none}
  .oauth-section.visible{display:block}
</style>
</head>
<body>
<div class="logo">Meal Stock Control</div>
<div class="card">
  <h1 id="card-title">Sign in</h1>
  <p class="subtitle" id="card-sub">Access your meal stock dashboard.</p>

  <div id="error-box" class="error" style="display:none"></div>
  <div id="success-box" class="success" style="display:none"></div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-signin" onclick="setMode('signin')">Sign in</button>
    <button class="mode-btn" id="btn-register" onclick="setMode('register')">Register</button>
  </div>

  <form id="auth-form" method="post" action="/auth/login">
    <div class="field name-field" id="name-field">
      <label for="display_name">Your name</label>
      <input type="text" id="display_name" name="display_name" autocomplete="name" placeholder="Display name">
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      <p class="hint" id="pw-hint" style="display:none">Minimum 8 characters</p>
      <a href="/auth/forgot-password" class="forgot-link" id="forgot-link">Forgot password?</a>
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">Sign in</button>
  </form>

  <div id="oauth-section" class="oauth-section">
    <div class="divider">or continue with</div>
    <a id="btn-google" href="/auth/google" class="oauth-btn" style="display:none">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </a>
    <a id="btn-facebook" href="/auth/facebook" class="oauth-btn" style="display:none">
      <svg viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Sign in with Facebook
    </a>
    <a id="btn-microsoft" href="/auth/microsoft" class="oauth-btn" style="display:none">
      <svg viewBox="0 0 24 24"><path fill="#F25022" d="M1 1h10v10H1z"/><path fill="#7FBA00" d="M13 1h10v10H13z"/><path fill="#00A4EF" d="M1 13h10v10H1z"/><path fill="#FFB900" d="M13 13h10v10H13z"/></svg>
      Sign in with Microsoft
    </a>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  var err = p.get('error');
  if (err) {
    var box = document.getElementById('error-box');
    box.style.display = 'block';
    box.textContent = err === 'taken' ? 'That email is already registered. Try signing in instead.'
      : err === 'invalid' ? 'Please enter a valid email and a password of at least 8 characters.'
      : 'Invalid email or password. Please try again.';
  }
  if (p.get('reset') === '1') {
    var sbox = document.getElementById('success-box');
    sbox.style.display = 'block';
    sbox.textContent = 'Password reset successfully. Please sign in with your new password.';
  }

  var o = window.__OAUTH__ || {};
  if (o.google || o.facebook || o.microsoft) {
    document.getElementById('oauth-section').classList.add('visible');
    if (o.google) document.getElementById('btn-google').style.display = 'flex';
    if (o.facebook) document.getElementById('btn-facebook').style.display = 'flex';
    if (o.microsoft) document.getElementById('btn-microsoft').style.display = 'flex';
  }
})();

function setMode(mode) {
  var isReg = mode === 'register';
  document.getElementById('btn-signin').classList.toggle('active', !isReg);
  document.getElementById('btn-register').classList.toggle('active', isReg);
  document.getElementById('card-title').textContent = isReg ? 'Create account' : 'Sign in';
  document.getElementById('card-sub').textContent = isReg ? 'Register to access meal stock.' : 'Access your meal stock dashboard.';
  document.getElementById('auth-form').action = isReg ? '/auth/register' : '/auth/login';
  document.getElementById('name-field').classList.toggle('visible', isReg);
  document.getElementById('submit-btn').textContent = isReg ? 'Create account' : 'Sign in';
  document.getElementById('pw-hint').style.display = isReg ? 'block' : 'none';
  document.getElementById('forgot-link').style.display = isReg ? 'none' : 'block';
  document.getElementById('password').autocomplete = isReg ? 'new-password' : 'current-password';
}
</script>
</body>
</html>
