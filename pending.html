<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Awaiting Approval — Meal Stock Control</title>
<style>
  :root{--bg:#f5f4f0;--surface:#fff;--border:#ddd9d0;--text:#1a1916;--text2:#6b6860;--accent:#2d6a4f;--accent-light:#e8f4ee;--radius:12px;}
  @media(prefers-color-scheme:dark){:root{--bg:#141412;--surface:#1e1d1a;--border:#35332e;--text:#f0ede8;--text2:#9b9890;--accent:#4ade80;--accent-light:#052e16;}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 32px;max-width:400px;width:100%;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08)}
  .icon{width:56px;height:56px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px}
  h1{font-size:20px;margin-bottom:10px}
  p{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:24px}
  a{color:var(--accent);text-decoration:none;font-size:13px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">⏳</div>
  <h1>Awaiting Approval</h1>
  <p>Your account has been created and is awaiting approval from an administrator. You'll be able to access the app once your account is approved.</p>
  <form method="post" action="/auth/logout" style="display:inline"><button style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;padding:0">Sign out</button></form>
</div>
</body>
</html>
